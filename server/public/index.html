<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Docker Learning | Create User</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div class="container" id="main-container">
            <h1>Welcome</h1>
            <p class="subtitle">
                Enter your details to create a new user account.
            </p>

            <form action="/create" method="POST" id="user-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="John Doe"
                        required
                        autocomplete="name"
                    />
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="john@example.com"
                        required
                        autocomplete="email"
                    />
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    />
                </div>

                <button type="submit" id="submit-btn shadow-lg">
                    Create Account
                </button>
            </form>

            <div class="footer">
                Already have an account? <a href="/users">View all users</a>
            </div>
        </div>
    </body>
</html>
